[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  included_files = ["assets/**"]

[[redirects]]
  from = "/api/roster"
  to = "/.netlify/functions/roster"
  status = 200

[[redirects]]
  from = "/api/users"
  to = "/.netlify/functions/users"
  status = 200

[[redirects]]
  from = "/api/admin/overview"
  to = "/.netlify/functions/admin-overview"
  status = 200

[[redirects]]
  from = "/api/admin/users"
  to = "/.netlify/functions/admin-users"
  status = 200

[[redirects]]
  from = "/api/session/start"
  to = "/.netlify/functions/session-start"
  status = 200

[[redirects]]
  from = "/api/policy/accept"
  to = "/.netlify/functions/policy-accept"
  status = 200

[[redirects]]
  from = "/api/quiz/submit"
  to = "/.netlify/functions/quiz-submit"
  status = 200

[[redirects]]
  from = "/api/recognitions/generate"
  to = "/.netlify/functions/recognitions-generate"
  status = 200

[[redirects]]
  from = "/api/recognitions/export-zip"
  to = "/.netlify/functions/recognitions-export-zip"
  status = 200

[[redirects]]
  from = "/api/recognitions/verify"
  to = "/.netlify/functions/recognitions-verify"
  status = 200

[[redirects]]
  from = "/api/recognitions/:id/download"
  to = "/.netlify/functions/recognitions-download?id=:id"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin/"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
